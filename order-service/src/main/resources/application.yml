spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/orderdb
    username: postgres
    password: postgres
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      properties:
        max.block.ms: 3000
        request.timeout.ms: 3000
      retries: 1

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

server:
  port: 8082

services:
  user-service:
    url: http://localhost:8085
  product-service:
    url: http://localhost:8087


razorpay:
  key-id: rzp_test_your_key_id_here
  key-secret: your_key_secret_here