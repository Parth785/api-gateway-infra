server:
  port: 8084

spring:
  cloud:
    gateway:
      routes:

        - id: user-service
          uri: http://localhost:8085
          predicates:
            - Path=/users/**

        - id: admin-service
          uri: http://localhost:8085
          predicates:
            - Path=/admin/**

        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/orders/**

        - id: product-service
          uri: http://localhost:8087
          predicates:
            - Path=/products/**

			  - id: review-service
          uri: http://localhost:8091
          predicates:
            - Path=/reviews/**