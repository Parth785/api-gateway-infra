server:
  port: 8084

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8085
          predicates:
            - Path=/users/**

        - id: admin-route
          uri: http://user-service:8085
          predicates:
            - Path=/admin/**

        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/orders/**

        - id: product-service
          uri: http://product-service:8087
          predicates:
            - Path=/products/**

        - id: review-service
          uri: http://review-service:8091
          predicates:
            - Path=/reviews/**

# disable service discovery
discovery:
  enabled: false

# disable Redis autoconfiguration
autoconfigure:
  exclude:
    - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
    - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always