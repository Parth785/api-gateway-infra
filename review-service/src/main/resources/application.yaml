server:
  port: 8091

spring:
  application:
    name: review-service
  datasource:
#    url: jdbc:postgresql://localhost:5438/reviewdb?options=-c%20TimeZone=Asia/Kolkata
#    username: postgres
#    password: postgres
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5438/reviewdb?options=-c%20TimeZone=Asia/Kolkata}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always